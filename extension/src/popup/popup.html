<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartBlock</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <header class="app-header">
    <div class="brand">
      <img class="brand-icon" src="../../icons/icon32.png" alt="">
      <h1>SmartBlock</h1>
    </div>
    <span id="status-badge" class="badge"></span>
  </header>

  <section id="today-section">
    <h2>Today</h2>
    <table id="usage-table">
      <thead>
        <tr>
          <th>Domain</th>
          <th>Used</th>
          <th>Limit</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="usage-body">
        <tr id="empty-row"><td colspan="4" class="empty">No entertainment tracked yet today.</td></tr>
      </tbody>
    </table>
  </section>

  <section id="add-section">
    <h2>Set a limit</h2>
    <div class="add-row">
      <input id="add-domain" class="field domain-field" type="text" placeholder="e.g. youtube.com" spellcheck="false">
      <input id="add-minutes" class="field mins-field" type="number" min="1" max="1440" value="30">
      <span class="unit-label">min</span>
      <button id="add-btn">Add</button>
    </div>
    <p id="add-error" class="error"></p>
  </section>

  <script type="module" src="popup.js"></script>
</body>
</html>
